<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LG NewsFeed</title>
  <style>
    :root {
      --bg: #0d0f12;
      --surface: #161a1f;
      --surface-2: #1e242c;
      --border: #2a3040;
      --text: #e2e8f0;
      --text-dim: #8896a9;
      --accent: #3b82f6;
      --accent-dim: #1e3a5f;
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --tag-banks: #1e3a5f;
      --tag-aw: #1a3a2a;
      --tag-ins: #3a2a1e;
      --tag-sf: #2a1e3a;
      --tag-markets: #1e2a3a;
      --tag-news: #3a1e2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48px;
    }
    .nav-brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      white-space: nowrap;
    }
    .nav-brand span { color: var(--accent); }
    .nav-tabs {
      display: flex;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border: none;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .nav-tab:hover { background: var(--surface-2); color: var(--text); }
    .nav-tab.active { background: var(--accent-dim); color: var(--accent); }
    .nav-meta {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent); }
    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    /* ARTICLE GRID */
    .articles-grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ARTICLE CARD */
    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      transition: border-color 0.15s, background 0.15s;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .article-card:hover {
      border-color: #3a4555;
      background: var(--surface-2);
    }
    .article-card.high-relevance {
      border-left: 3px solid var(--accent);
    }
    .article-card.relevance-9,
    .article-card.relevance-10 {
      border-left: 3px solid var(--green);
    }

    .card-main { min-width: 0; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .source-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }
    .tag-banks    { background: var(--tag-banks);   color: #60a5fa; }
    .tag-aw       { background: var(--tag-aw);      color: #34d399; }
    .tag-ins      { background: var(--tag-ins);     color: #fb923c; }
    .tag-sf       { background: var(--tag-sf);      color: #a78bfa; }
    .tag-markets  { background: var(--tag-markets); color: #7dd3fc; }
    .tag-news     { background: var(--tag-news);    color: #f472b6; }

    .source-name {
      font-size: 12px;
      color: var(--text-dim);
    }
    .article-date {
      font-size: 12px;
      color: var(--text-dim);
    }

    .article-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      line-height: 1.4;
      display: block;
      margin-bottom: 5px;
    }
    .article-title:hover { color: var(--accent); }

    .article-digest {
      font-size: 13px;
      color: #a0aec0;
      line-height: 1.55;
      margin-bottom: 6px;
    }

    .article-highlight {
      font-size: 12px;
      color: var(--amber);
      background: rgba(245, 158, 11, 0.08);
      border-left: 2px solid var(--amber);
      padding: 4px 8px;
      border-radius: 0 4px 4px 0;
      margin-top: 4px;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      padding-top: 2px;
    }
    .relevance-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 12px;
      min-width: 28px;
      text-align: center;
    }
    .rel-high   { background: rgba(16, 185, 129, 0.15); color: var(--green); }
    .rel-mid    { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
    .rel-low    { background: rgba(136, 150, 169, 0.1); color: var(--text-dim); }

    /* SECTION HEADER */
    .section-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-count {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    /* EMPTY / LOADING */
    .loading-state, .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 60px 20px;
      font-size: 14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 24px 0 12px;
    }
    .page-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .page-btn:hover, .page-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      display: block;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">LG <span>NewsFeed</span></div>
  <div class="nav-tabs" id="navTabs"></div>
  <span class="nav-meta" id="lastUpdated">–</span>
  <button class="refresh-btn" onclick="loadFeeds()">↻ Refresh</button>
</nav>

<div class="container">
  <div class="filter-bar">
    <input
      class="search-input"
      type="text"
      id="searchInput"
      placeholder="Search headlines, sources, topics..."
      oninput="onSearch()"
    />
    <select class="sort-select" id="sortSelect" onchange="renderCurrent()">
      <option value="relevance">Sort: Relevance</option>
      <option value="date">Sort: Newest</option>
    </select>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-item">
      <span class="stat-value" id="statTotal">–</span>
      <span class="stat-label">Total Stories</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statHighSignal">–</span>
      <span class="stat-label">High Signal (≥8)</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statFIG">–</span>
      <span class="stat-label">FIG</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statSources">–</span>
      <span class="stat-label">Sources</span>
    </div>
  </div>

  <div id="feedContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading feed...
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
  const FEED_URL = 'data/feeds.json';
  const PAGE_SIZE = 30;

  const SECTIONS = [
    { key: 'all',         label: 'All' },
    { key: 'FIG — Banks', label: 'Banks' },
    { key: 'FIG — Asset & Wealth Management', label: 'Asset & Wealth' },
    { key: 'FIG — Insurance', label: 'Insurance' },
    { key: 'FIG — Specialty Finance', label: 'Specialty Finance' },
    { key: 'Markets & Macro', label: 'Markets & Macro' },
    { key: 'Newsletters', label: 'Newsletters' },
  ];

  const SECTION_TAG_MAP = {
    'FIG — Banks':                    { cls: 'tag-banks',   short: 'Banks' },
    'FIG — Asset & Wealth Management':{ cls: 'tag-aw',      short: 'A&W' },
    'FIG — Insurance':                { cls: 'tag-ins',     short: 'Insurance' },
    'FIG — Specialty Finance':        { cls: 'tag-sf',      short: 'SF' },
    'Markets & Macro':                { cls: 'tag-markets', short: 'Markets' },
    'Newsletters':                    { cls: 'tag-news',    short: 'NL' },
  };

  let allArticles = [];
  let filtered = [];
  let currentSection = 'all';
  let currentPage = 1;
  let searchQuery = '';

  // Build nav tabs
  const navTabs = document.getElementById('navTabs');
  SECTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (s.key === 'all' ? ' active' : '');
    btn.textContent = s.label;
    btn.dataset.key = s.key;
    btn.onclick = () => switchSection(s.key);
    navTabs.appendChild(btn);
  });

  async function loadFeeds() {
    document.getElementById('feedContainer').innerHTML =
      '<div class="loading-state"><div class="spinner"></div>Loading feed...</div>';
    try {
      const r = await fetch(FEED_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error('Feed not found');
      allArticles = await r.json();
      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      updateStats();
      applyFilters();
    } catch (e) {
      document.getElementById('feedContainer').innerHTML =
        `<div class="empty-state">Could not load feed. Run the fetch script to generate data/feeds.json.<br><small style="color:#555;margin-top:8px;display:block">${e.message}</small></div>`;
    }
  }

  function updateStats() {
    const statsBar = document.getElementById('statsBar');
    statsBar.style.display = 'flex';
    document.getElementById('statTotal').textContent = allArticles.length;
    document.getElementById('statHighSignal').textContent =
      allArticles.filter(a => (a.summary_ai?.relevance || 0) >= 8).length;
    document.getElementById('statFIG').textContent =
      allArticles.filter(a => a.section.startsWith('FIG')).length;
    document.getElementById('statSources').textContent =
      new Set(allArticles.map(a => a.source)).size;
  }

  function switchSection(key) {
    currentSection = key;
    currentPage = 1;
    document.querySelectorAll('.nav-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.key === key));
    applyFilters();
  }

  function onSearch() {
    searchQuery = document.getElementById('searchInput').value.toLowerCase();
    currentPage = 1;
    applyFilters();
  }

  function applyFilters() {
    filtered = allArticles.filter(a => {
      const sectionMatch = currentSection === 'all' || a.section === currentSection;
      const q = searchQuery;
      const searchMatch = !q ||
        a.title.toLowerCase().includes(q) ||
        a.source.toLowerCase().includes(q) ||
        (a.summary_ai?.digest || '').toLowerCase().includes(q) ||
        (a.summary_ai?.highlight || '').toLowerCase().includes(q);
      return sectionMatch && searchMatch;
    });
    renderCurrent();
  }

  function renderCurrent() {
    const sort = document.getElementById('sortSelect').value;
    const sorted = [...filtered].sort((a, b) => {
      if (sort === 'relevance') {
        const ra = a.summary_ai?.relevance || 5;
        const rb = b.summary_ai?.relevance || 5;
        if (rb !== ra) return rb - ra;
      }
      return (b.date || '').localeCompare(a.date || '');
    });

    const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
    currentPage = Math.min(currentPage, totalPages);
    const pageItems = sorted.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    const container = document.getElementById('feedContainer');

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">No articles match your filters.</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    // Group by section if viewing "all"
    let html = '';
    if (currentSection === 'all') {
      const grouped = {};
      pageItems.forEach(a => {
        if (!grouped[a.section]) grouped[a.section] = [];
        grouped[a.section].push(a);
      });
      const sectionOrder = [
        'FIG — Banks',
        'FIG — Asset & Wealth Management',
        'FIG — Insurance',
        'FIG — Specialty Finance',
        'Markets & Macro',
        'Newsletters',
      ];
      sectionOrder.forEach(sec => {
        if (grouped[sec]?.length) {
          html += `<div class="section-header">${sec} <span class="section-count">${grouped[sec].length} stories</span></div>`;
          html += '<div class="articles-grid">';
          grouped[sec].forEach(a => { html += renderCard(a); });
          html += '</div>';
        }
      });
    } else {
      html = '<div class="articles-grid">';
      pageItems.forEach(a => { html += renderCard(a); });
      html += '</div>';
    }

    container.innerHTML = html;
    renderPagination(totalPages);
  }

  function renderCard(a) {
    const ai = a.summary_ai || {};
    const rel = ai.relevance || 5;
    const tagInfo = SECTION_TAG_MAP[a.section] || { cls: 'tag-markets', short: a.section };
    const relClass = rel >= 8 ? 'rel-high' : rel >= 6 ? 'rel-mid' : 'rel-low';
    const cardClass = rel >= 9 ? 'article-card relevance-9' : rel >= 7 ? 'article-card high-relevance' : 'article-card';

    const date = a.date ? timeAgo(a.date) : '';
    const digest = ai.digest
      ? `<p class="article-digest">${escHtml(ai.digest)}</p>`
      : '';
    const highlight = ai.highlight
      ? `<div class="article-highlight">⚡ ${escHtml(ai.highlight)}</div>`
      : '';

    return `
      <div class="${cardClass}">
        <div class="card-main">
          <div class="card-meta">
            <span class="source-tag ${tagInfo.cls}">${tagInfo.short}</span>
            <span class="source-name">${escHtml(a.source)}</span>
            <span class="article-date">${date}</span>
          </div>
          <a class="article-title" href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.title)}</a>
          ${digest}
          ${highlight}
        </div>
        <div class="card-right">
          <span class="relevance-badge ${relClass}" title="Relevance score">${rel}</span>
        </div>
      </div>`;
  }

  function renderPagination(totalPages) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = '';
    html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 3) {
        html += `<span style="color:var(--text-dim);padding:0 4px">…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next →</button>`;
    pg.innerHTML = html;
  }

  function goPage(n) {
    currentPage = n;
    renderCurrent();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function timeAgo(iso) {
    try {
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    } catch { return ''; }
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadFeeds();
</script>
</body>
</html>
