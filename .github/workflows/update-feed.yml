name: Update NewsFeed

on:
  schedule:
   # Every 2 hours, 7am–11pm ET (UTC-4)
    - cron: '0 11,13,15,17,19,21,23,1 * * 1-5'  # Weekdays
    - cron: '0 13,17,21 * * 0,6'                  # Weekends (lighter)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py

      - name: Fetch user notes from Gist
        env:
          SYNC_GIST_PAT: ${{ secrets.SYNC_GIST_PAT }}
        run: python scripts/fetch_notes.py

      - name: Summarize with Claude Haiku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/summarize.py

      - name: Generate lane briefs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefs.py

       - name: Copy data to docs/
        run: |
          mkdir -p docs/data
          cp data/feeds.json docs/data/feeds.json
          cp data/briefs.json docs/data/briefs.json

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/feeds.json docs/data/briefs.json
          git add data/notes.md data/notes_archive/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
