## Sites without a clean public RSS feed — handled by fetch_feeds.py's scraper.
## NOTE: both are JavaScript-rendered. The current requests+BeautifulSoup scraper
## will likely return nothing; production should scrape these with Playwright
## (available in Claude Code). Disable (enabled: false) until that's wired.
scrape_targets:
  - name: "Business Wire — Financial Services"
    url: "https://www.businesswire.com/newsroom?industry=financial-services"
    type: scrape
    enabled: false
  # Citywire RIA DOES publish an RSS feed (declared in page <head>):
  #   https://citywire.com/ria/latest-news/rss.xml
  # It returns 200 + 20 items in a logged-in browser, but EMPTY from an
  # unauthenticated server fetch. Cause is either login-cookie gating or
  # user-agent/WAF blocking of non-browser clients. TEST in the live pipeline
  # first (fetch_feeds.py sends a Mozilla UA — may pass the WAF). If still empty,
  # it's login-gated: automating then needs stored Citywire cookies as secrets
  # (fragile + check ToS). Until verified, leave disabled.
  - name: "Citywire RIA (login/UA-gated RSS — verify in pipeline)"
    url: "https://citywire.com/ria/latest-news/rss.xml"
    type: rss
    enabled: false
