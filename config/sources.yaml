newsletters:
  - name: "The Daily Upside"
    url: "https://www.thedailyupside.com/feed/"
    type: rss
  - name: "Morning Brew"
    url: "https://www.morningbrew.com/daily/feed"
    type: rss
  - name: "Axios Financial Services"
    url: "https://api.axios.com/feed/columns/the-axios-financial-services-newsletter"
    type: rss
  ## DealBook is already pulled via NYT RSS above
  ## Axios Pro requires scraping — handled in scrape_niche.py

scrape_targets:
  - name: "Axios Pro Financial Services"
    url: "https://www.axios.com/pro/financial-services"
    type: scrape
    selector: "article"
    enabled: true
  - name: "PitchBook News"
    url: "https://pitchbook.com/news/articles"
    type: scrape
    selector: "article"
    enabled: true
