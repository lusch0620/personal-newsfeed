<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LG NewsFeed — Briefing Deck (concept)</title>
<style>
  :root{
    --bg:#07080c; --ink:#eef1f6; --muted:#8a93a6; --faint:#5b6678;
    --glass:rgba(255,255,255,.045); --glass-strong:rgba(255,255,255,.08);
    --stroke:rgba(255,255,255,.10); --stroke-soft:rgba(255,255,255,.06);
    --banks:#60a5fa; --aw:#34d399; --ins:#fb923c; --sf:#a78bfa;
    --pe:#e879f9; --markets:#7dd3fc; --news:#f472b6; --career:#fcd34d; --learn:#5eead4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;overflow-x:hidden;position:relative}
  /* aurora field */
  .aurora{position:fixed;inset:-30vmax;z-index:0;filter:blur(90px);opacity:.55;pointer-events:none}
  .aurora b{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 26s ease-in-out infinite}
  .aurora .a1{width:46vmax;height:46vmax;background:#1b3a8f;top:2%;left:6%}
  .aurora .a2{width:40vmax;height:40vmax;background:#5b1d6e;top:30%;right:0%;animation-delay:-8s}
  .aurora .a3{width:34vmax;height:34vmax;background:#0e5a52;bottom:-6%;left:34%;animation-delay:-15s}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4vmax,-3vmax) scale(1.08)}66%{transform:translate(-3vmax,3vmax) scale(.96)}}
  @media (prefers-reduced-motion:reduce){.aurora b{animation:none}}

  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:34px 28px 120px}

  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:8px;flex-wrap:wrap}
  .brand{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
  .edition{font-size:40px;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-top:6px}
  .edition span{color:var(--markets)}
  .subline{color:var(--muted);font-size:14px;margin-top:8px}
  .meter{display:flex;align-items:center;gap:14px}
  .ring{position:relative;width:74px;height:74px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .num b{font-size:22px;font-weight:600;line-height:1}
  .ring .num small{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

  .lanes{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 26px}
  .lane{font-size:12.5px;color:var(--muted);border:1px solid var(--stroke-soft);background:var(--glass);
    padding:7px 13px;border-radius:999px;cursor:pointer;transition:.2s;backdrop-filter:blur(8px);user-select:none}
  .lane:hover{color:var(--ink);border-color:var(--stroke)}
  .lane.active{color:#07080c;background:#eef1f6;border-color:#eef1f6;font-weight:500}

  /* BENTO */
  .deck{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:118px;gap:14px}
  .card{position:relative;border-radius:18px;border:1px solid var(--stroke);overflow:hidden;cursor:pointer;
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    padding:18px;display:flex;flex-direction:column;justify-content:space-between;
    transition:transform .45s cubic-bezier(.2,.8,.2,1),opacity .45s,filter .45s,border-color .25s;will-change:transform}
  .card::before{content:"";position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .3s;
    background:radial-gradient(380px circle at var(--mx,50%) var(--my,0%),rgba(255,255,255,.14),transparent 60%);pointer-events:none}
  .card:hover{transform:translateY(-4px);border-color:var(--stroke)}
  .card:hover::before{opacity:1}
  .card .accentbar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
  .c-head{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--muted)}
  .tag{font-size:10.5px;font-weight:600;letter-spacing:.04em;padding:3px 9px;border-radius:999px}
  .score{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:600;font-size:12px;color:var(--ink);
    display:flex;align-items:center;gap:4px}
  .score i{width:6px;height:6px;border-radius:50%;display:inline-block}
  .c-title{font-weight:600;letter-spacing:-.01em;line-height:1.22}
  .c-foot{display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:11.5px}
  .src{color:var(--muted)}
  /* sizes by relevance */
  .s-hero{grid-column:span 2;grid-row:span 2}
  .s-hero .c-title{font-size:25px}
  .s-hero .c-digest{display:block;color:var(--muted);font-size:13.5px;line-height:1.5;margin-top:10px}
  .s-wide{grid-column:span 2;grid-row:span 1}
  .s-wide .c-title{font-size:16.5px}
  .s-tall{grid-column:span 1;grid-row:span 2}
  .s-tall .c-title{font-size:16px}
  .s-sm{grid-column:span 1;grid-row:span 1}
  .s-sm .c-title{font-size:13.5px}
  .c-digest{display:none}

  /* READ STATE — recede to background */
  .card.read{filter:grayscale(1) brightness(.62);opacity:.5;transform:scale(.96)}
  .card.read:hover{opacity:.8;transform:scale(.97)}

  /* dismiss animation handled by JS via transform */
  .card.dismissing{opacity:0;transform:scale(.7) translateY(40px);pointer-events:none}

  /* READ TRAY (the "background" stratum) */
  .tray{margin-top:40px;border-top:1px solid var(--stroke-soft);padding-top:18px}
  .tray h3{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:500;
    display:flex;align-items:center;gap:10px;cursor:pointer}
  .tray h3 .cnt{color:var(--muted)}
  .tray h3 .chev{margin-left:auto;transition:.3s}
  .tray.collapsed .chev{transform:rotate(-90deg)}
  .tray-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;transition:.3s}
  .tray.collapsed .tray-list{display:none}
  .chip{font-size:12px;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--stroke-soft);
    padding:8px 12px;border-radius:10px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:.2s}
  .chip:hover{color:var(--ink);border-color:var(--stroke)}

  /* end-of-edition — no infinite scroll */
  .endcap{text-align:center;margin-top:54px;color:var(--muted)}
  .endcap .rule{height:1px;background:linear-gradient(90deg,transparent,var(--stroke),transparent);margin-bottom:22px}
  .endcap p{font-size:14px;margin-bottom:16px}
  .btn{font:inherit;font-size:14px;color:var(--ink);background:var(--glass-strong);border:1px solid var(--stroke);
    padding:12px 22px;border-radius:12px;cursor:pointer;backdrop-filter:blur(8px);transition:.2s}
  .btn:hover{border-color:#eef1f6}

  /* READER OVERLAY */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(4,5,9,.6);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:28px;opacity:0;transition:opacity .3s}
  .scrim.open{display:flex;opacity:1}
  .reader{width:min(680px,100%);max-height:84vh;overflow:auto;border-radius:22px;border:1px solid var(--stroke);
    background:rgba(18,20,28,.85);backdrop-filter:blur(22px);padding:34px;transform:translateY(16px) scale(.98);transition:.35s cubic-bezier(.2,.8,.2,1)}
  .scrim.open .reader{transform:none}
  .reader .r-tag{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin-bottom:16px}
  .reader h2{font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1.18;margin-bottom:14px}
  .reader .r-meta{color:var(--faint);font-size:12.5px;margin-bottom:20px}
  .reader p.body{color:#cdd3df;font-size:15.5px;line-height:1.7;margin-bottom:14px}
  .reader .hl{border-left:2px solid var(--markets);padding:10px 0 10px 16px;color:var(--ink);font-size:14.5px;
    background:rgba(125,211,252,.05);border-radius:0 8px 8px 0;margin:18px 0}
  .r-actions{display:flex;gap:10px;margin-top:26px}
  .r-actions .btn.primary{background:#eef1f6;color:#07080c;border-color:#eef1f6;font-weight:500}
</style>
</head>
<body>
<div class="aurora"><b class="a1"></b><b class="a2"></b><b class="a3"></b></div>

<div class="wrap">
  <header class="top">
    <div>
      <div class="brand">LG NewsFeed</div>
      <div class="edition">Friday <span>briefing</span></div>
      <div class="subline">June 27, 2026 &middot; evening edition &middot; 14 stories curated from 40 sources</div>
    </div>
    <div class="meter">
      <div class="ring">
        <svg width="74" height="74">
          <circle cx="37" cy="37" r="32" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"></circle>
          <circle id="prog" cx="37" cy="37" r="32" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="201"></circle>
        </svg>
        <div class="num"><b id="readCount">0</b><small>read</small></div>
      </div>
    </div>
  </header>

  <div class="lanes" id="lanes"></div>
  <div class="deck" id="deck"></div>

  <div class="tray collapsed" id="tray">
    <h3 id="trayHead"><span>Read &middot; in the background</span> <span class="cnt" id="trayCnt">(0)</span> <i class="chev">&#9662;</i></h3>
    <div class="tray-list" id="trayList"></div>
  </div>

  <div class="endcap">
    <div class="rule"></div>
    <p>That's the edition. No endless scroll &mdash; you've reached the end of today.</p>
    <button class="btn" onclick="loadEarlier(this)">Load yesterday's edition</button>
  </div>
</div>

<div class="scrim" id="scrim">
  <div class="reader" id="reader"></div>
</div>

<script>
const LANE={banks:{l:"Banks",c:"--banks"},markets:{l:"Markets & Macro",c:"--markets"},
  news:{l:"Newsletters",c:"--news"},pe:{l:"PE & Deals",c:"--pe"},sf:{l:"Specialty Finance",c:"--sf"},
  career:{l:"Career",c:"--career"},learn:{l:"Learn",c:"--learn"},aw:{l:"Asset & Wealth",c:"--aw"}};

const DATA=[
 {id:1,size:"s-hero",lane:"banks",score:9,src:"CNBC",time:"2h ago",
  title:"JPMorgan names Petno and Rohrbaugh co-presidents as Marianne Lake exits",
  digest:"Co-president structure positions the two as primary CEO succession candidates post-Dimon. The clearest signal yet on the line of succession at the largest U.S. bank by assets.",
  body:["JPMorgan Chase named Doug Petno and Troy Rohrbaugh as co-presidents, while longtime executive Marianne Lake departs after 30 years.","The move sharpens the field of internal candidates to eventually succeed Jamie Dimon, and reshapes the reporting lines across the commercial and markets businesses."],
  hl:"Co-president structure at the $3.9T-asset bank makes Petno and Rohrbaugh the obvious succession frontrunners."},
 {id:2,size:"s-wide",lane:"sf",score:8,src:"Finextra",time:"3h ago",
  title:"Binance to stop serving EU customers after failing to secure MiCA license",
  digest:"",
  body:["Binance told EU customers it will halt services from July 1 after failing to obtain a license under the bloc's Markets in Crypto-Assets Regulation."],
  hl:"MiCA enforcement forces the largest global exchange out of the EU — consolidation opening for licensed players."},
 {id:3,size:"s-tall",lane:"news",score:9,src:"Net Interest",time:"5h ago",
  title:"The deposit franchise nobody is pricing correctly",
  digest:"Marc Rubinstein on why the market keeps misreading regional-bank funding costs through the cycle.",
  body:["Rubinstein walks through the mechanics of deposit beta and argues the current consensus underprices the value of low-cost, sticky retail funding at a handful of regionals."],
  hl:"A reusable frame for valuing deposit franchises — directly relevant to FIG comps."},
 {id:4,size:"s-sm",lane:"banks",score:8,src:"Banking Dive",time:"4h ago",
  title:"Two Southeast banks to merge in $163M all-stock deal",
  digest:"",body:["Colony Bank to acquire First Reliance Bancshares, becoming the largest sub-$10B bank in Georgia/South Carolina."],
  hl:"$163M all-stock; platform for further add-on M&A in the Southeast."},
 {id:5,size:"s-sm",lane:"pe",score:8,src:"PE Hub",time:"6h ago",
  title:"Mid-market PE firm raises $2.1B for financial-services fund",
  digest:"",body:["The fund will target specialty lenders and insurance services in the lower-middle market."],
  hl:"Fresh dry powder aimed squarely at specialty finance."},
 {id:6,size:"s-wide",lane:"learn",score:9,src:"Stratechery",time:"7h ago",
  title:"Aggregation theory, ten years on: what the AI platforms got right",
  digest:"Ben Thompson revisits the framework against the current platform wars.",
  body:["Thompson maps his aggregation thesis onto the AI incumbents and argues distribution, not models, remains the moat."],
  hl:"A strategy frame that travels well beyond tech — useful for thinking about any platform business."},
 {id:7,size:"s-sm",lane:"career",score:8,src:"eFinancialCareers",time:"8h ago",
  title:"Where FIG bankers are lateraling in 2026",
  digest:"",body:["A read on which platforms are paying up for FIG coverage talent this cycle, and where bonuses are landing."],
  hl:"Direct lateral-market signal for FIG analysts."},
 {id:8,size:"s-sm",lane:"markets",score:7,src:"TKer",time:"9h ago",
  title:"The labor market is cooling, not cracking",
  digest:"",body:["Sam Ro on why the latest payrolls print is consistent with a soft landing rather than a downturn."],
  hl:"Clear takeaway on the rates path into year-end."},
 {id:9,size:"s-tall",lane:"markets",score:8,src:"The Overshoot",time:"10h ago",
  title:"Credit conditions are quietly tightening at the regionals",
  digest:"Matthew Klein on the data beneath the headline spreads.",
  body:["Klein digs into senior-loan-officer survey internals and argues the tightening is concentrated in CRE-exposed regionals."],
  hl:"Read-through to deal financing availability for smaller banks."},
 {id:10,size:"s-sm",lane:"aw",score:7,src:"Wealth Mgmt",time:"11h ago",
  title:"RIA roll-up pace hits record in Q2",
  digest:"",body:["Aggregators closed a record number of RIA deals, with valuations holding despite higher financing costs."],
  hl:"Sustained RIA M&A — relevant to A&W coverage."},
 {id:11,size:"s-sm",lane:"learn",score:7,src:"Noahpinion",time:"13h ago",
  title:"Why the productivity debate is mostly measurement",
  digest:"",body:["Noah Smith argues much of the AI-productivity disagreement is a statistics problem, not an economics one."],
  hl:"Sharpens how to read upcoming productivity data."},
 {id:12,size:"s-sm",lane:"news",score:7,src:"The Diff",time:"14h ago",
  title:"The economics of a stablecoin issuer",
  digest:"",body:["Byrne Hobart breaks down the float-driven business model and where the regulatory risk actually sits."],
  hl:"Frames the digital-assets opportunity in FIG terms."},
 {id:13,size:"s-sm",lane:"pe",score:7,src:"Buyouts",time:"16h ago",
  title:"Secondaries pricing firms up as LPs seek liquidity",
  digest:"",body:["Discounts to NAV narrowed in the latest tranche of LP-led deals."],
  hl:"Liquidity returning to the secondaries market."},
 {id:14,size:"s-sm",lane:"markets",score:6,src:"WSJ Markets",time:"17h ago",
  title:"Treasury yields drift as traders weigh data",
  digest:"",body:["A quiet session with the 10-year little changed ahead of next week's inflation print."],
  hl:"Routine session; watch next week's CPI."}
];

const deck=document.getElementById('deck');
const tray=document.getElementById('tray'), trayList=document.getElementById('trayList'), trayCnt=document.getElementById('trayCnt');
let activeLane="all", readSet=new Set();

function cvar(c){return getComputedStyle(document.documentElement).getPropertyValue(c).trim()}

function render(){
  deck.innerHTML="";
  DATA.filter(d=>!readSet.has(d.id)).filter(d=>activeLane==="all"||d.lane===activeLane)
    .sort((a,b)=>b.score-a.score)
    .forEach(d=>deck.appendChild(card(d)));
}

function card(d){
  const L=LANE[d.lane], col=cvar(L.c);
  const el=document.createElement('div');
  el.className="card "+d.size; el.dataset.id=d.id;
  el.innerHTML=`
    <div class="accentbar" style="background:${col}"></div>
    <div class="c-head">
      <span class="tag" style="background:${col}22;color:${col}">${L.l}</span>
      <span class="score"><i style="background:${col}"></i>${d.score}</span>
    </div>
    <div>
      <div class="c-title">${d.title}</div>
      ${d.digest?`<div class="c-digest">${d.digest}</div>`:""}
    </div>
    <div class="c-foot"><span class="src">${d.src}</span><span>${d.time}</span></div>`;
  el.addEventListener('mousemove',e=>{const r=el.getBoundingClientRect();
    el.style.setProperty('--mx',(e.clientX-r.left)+'px');el.style.setProperty('--my',(e.clientY-r.top)+'px')});
  el.addEventListener('click',()=>openReader(d));
  return el;
}

function openReader(d){
  const L=LANE[d.lane], col=cvar(L.c);
  const r=document.getElementById('reader');
  r.innerHTML=`
    <div class="r-tag"><span class="tag" style="background:${col}22;color:${col}">${L.l}</span> &middot; relevance ${d.score}/10</div>
    <h2>${d.title}</h2>
    <div class="r-meta">${d.src} &middot; ${d.time}</div>
    ${d.body.map(p=>`<p class="body">${p}</p>`).join("")}
    <div class="hl">${d.hl}</div>
    <div class="r-actions">
      <button class="btn primary" id="markBtn">Mark read &amp; send to background</button>
      <button class="btn" onclick="closeReader()">Keep in deck</button>
    </div>`;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('markBtn').onclick=()=>{closeReader();markRead(d);};
}
function closeReader(){document.getElementById('scrim').classList.remove('open');}
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeReader();});

function markRead(d){
  const el=deck.querySelector(`.card[data-id="${d.id}"]`);
  if(el){el.classList.add('dismissing');setTimeout(()=>{commitRead(d);},450);}
  else commitRead(d);
}
function commitRead(d){
  readSet.add(d.id);
  render(); updateMeter(); buildTray();
}

function buildTray(){
  trayList.innerHTML="";
  const items=DATA.filter(d=>readSet.has(d.id));
  trayCnt.textContent=`(${items.length})`;
  items.forEach(d=>{const c=document.createElement('div');c.className="chip";
    c.textContent=d.title;c.title="Reopen";
    c.onclick=()=>{readSet.delete(d.id);render();updateMeter();buildTray();};
    trayList.appendChild(c);});
  if(items.length && tray.classList.contains('collapsed') && items.length<=1) tray.classList.remove('collapsed');
}
document.getElementById('trayHead').onclick=()=>tray.classList.toggle('collapsed');

function updateMeter(){
  const n=readSet.size, total=DATA.length;
  document.getElementById('readCount').textContent=n;
  const c=2*Math.PI*32;
  document.getElementById('prog').style.strokeDashoffset=c*(1-n/total);
}

function buildLanes(){
  const lanes=document.getElementById('lanes');
  const keys=["all",...new Set(DATA.map(d=>d.lane))];
  keys.forEach(k=>{const b=document.createElement('div');
    b.className="lane"+(k==="all"?" active":"");
    b.textContent=k==="all"?"All":LANE[k].l;
    b.onclick=()=>{activeLane=k;document.querySelectorAll('.lane').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
    lanes.appendChild(b);});
}

function loadEarlier(btn){btn.textContent="You're all caught up ✓";btn.disabled=true;btn.style.opacity=.5;}

buildLanes(); render(); updateMeter(); buildTray();
</script>
</body>
</html>
