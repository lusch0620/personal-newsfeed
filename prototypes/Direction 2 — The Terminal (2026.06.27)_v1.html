<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LG NewsFeed — Terminal</title>
<style>
  :root{
    --bg:#06070a; --panel:rgba(255,255,255,.03); --stroke:rgba(120,200,255,.14);
    --ink:#d7e3ea; --dim:#6b7a86; --faint:#46535d;
    --amber:#f5b53d; --green:#3ddc84; --cyan:#5ad6ff; --red:#ff5d5d;
    --banks:#5ad6ff; --aw:#3ddc84; --ins:#f59e42; --sf:#b58bff;
    --pe:#ff7ad6; --markets:#5ad6ff; --news:#ff8fb0; --career:#f5d23d; --learn:#3ee0c8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,"Cascadia Code",Consolas,monospace}
  body{min-height:100vh}
  .glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px circle at 80% -10%,rgba(40,90,160,.22),transparent 60%),radial-gradient(700px circle at 0% 110%,rgba(80,40,120,.18),transparent 55%)}
  .scan{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0px,rgba(255,255,255,.012) 1px,transparent 1px,transparent 3px);opacity:.6}
  .wrap{position:relative;z-index:1}

  /* ticker */
  .ticker{border-bottom:1px solid var(--stroke);background:rgba(0,0,0,.35);overflow:hidden;white-space:nowrap;font-size:12.5px;padding:8px 0}
  .ticker .run{display:inline-block;padding-left:100%;animation:marq 38s linear infinite}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-100%)}}
  .ticker .it{margin:0 22px;color:var(--dim)}
  .ticker .it b{color:var(--ink);font-weight:600}
  .ticker .up{color:var(--green)} .ticker .mid{color:var(--amber)} .ticker .lo{color:var(--faint)}
  @media (prefers-reduced-motion:reduce){.ticker .run{animation:none;padding-left:0}}

  .top{display:flex;align-items:baseline;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--stroke);flex-wrap:wrap;gap:10px}
  .logo{font-size:14px;letter-spacing:.18em;color:var(--cyan)}
  .logo b{color:var(--ink)}
  .clock{font-size:12px;color:var(--dim)}
  .clock b{color:var(--amber)}
  .cmd{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--dim);border:1px solid var(--stroke);border-radius:6px;padding:6px 10px;background:var(--panel);min-width:280px}
  .cmd .cur{width:7px;height:14px;background:var(--cyan);display:inline-block;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .body{display:grid;grid-template-columns:208px 1fr;min-height:70vh}
  .watch{border-right:1px solid var(--stroke);padding:14px 12px}
  .watch h4{font-size:10.5px;letter-spacing:.2em;color:var(--faint);margin:6px 6px 10px}
  .wrow{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:7px 8px;border-radius:5px;cursor:pointer;color:var(--dim);transition:.15s}
  .wrow:hover{background:var(--panel);color:var(--ink)}
  .wrow.active{background:rgba(90,214,255,.10);color:var(--ink)}
  .wrow .dot{width:7px;height:7px;border-radius:2px;margin-right:8px;display:inline-block}
  .wrow .n{flex:1} .wrow .c{color:var(--faint);font-variant-numeric:tabular-nums}

  .feed{padding:6px 0}
  .hrow{display:grid;grid-template-columns:64px 78px 1fr 132px 70px;gap:10px;font-size:10.5px;letter-spacing:.12em;color:var(--faint);padding:10px 20px;border-bottom:1px solid var(--stroke)}
  .row{display:grid;grid-template-columns:64px 78px 1fr 132px 70px;gap:10px;align-items:center;font-size:13px;padding:12px 20px;border-bottom:1px solid rgba(120,200,255,.06);cursor:pointer;transition:.12s;position:relative}
  .row:hover{background:rgba(90,214,255,.05)}
  .row .sc{font-variant-numeric:tabular-nums;font-weight:600;display:flex;align-items:center;gap:7px}
  .row .sc .bar{width:34px;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
  .row .sc .bar i{display:block;height:100%}
  .row .lane{font-size:11px;letter-spacing:.06em}
  .row .ttl{color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px}
  .row .src{color:var(--dim);font-size:12px}
  .row .tm{color:var(--faint);font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
  .row.read{opacity:.34}
  .row.read .ttl{text-decoration:line-through;text-decoration-color:var(--faint)}
  .row.read::after{content:"FILED";position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:9px;letter-spacing:.2em;color:var(--green);border:1px solid rgba(61,220,132,.4);padding:2px 6px;border-radius:4px}
  .row.read .tm{visibility:hidden}

  .end{padding:26px 20px;text-align:center;color:var(--faint);font-size:12px;letter-spacing:.18em}
  .end .b{font-size:12px;color:var(--dim);border:1px dashed var(--stroke);display:inline-block;padding:8px 16px;border-radius:6px;margin-top:10px;cursor:pointer;letter-spacing:.06em}
  .end .b:hover{color:var(--ink);border-color:var(--cyan)}

  .scrim{position:fixed;inset:0;z-index:40;background:rgba(2,4,8,.7);display:none;align-items:center;justify-content:center;padding:24px}
  .scrim.open{display:flex}
  .term{width:min(660px,100%);border:1px solid var(--stroke);background:#080a0f;border-radius:8px;max-height:84vh;overflow:auto}
  .term .bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--stroke);font-size:11px;color:var(--dim);letter-spacing:.1em}
  .term .bar .x{margin-left:auto;cursor:pointer;color:var(--dim)}
  .term .bar .x:hover{color:var(--red)}
  .term .pad{padding:26px}
  .term .lane{font-size:11px;letter-spacing:.06em;margin-bottom:12px}
  .term h2{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:24px;font-weight:600;line-height:1.2;color:#fff;margin-bottom:10px}
  .term .meta{color:var(--faint);font-size:12px;margin-bottom:18px}
  .term p{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#aebcc6;font-size:15px;line-height:1.65;margin-bottom:12px}
  .term .hl{border-left:2px solid var(--amber);padding-left:14px;color:var(--amber);font-size:13.5px;margin:16px 0}
  .term .act{display:flex;gap:10px;margin-top:22px}
  .term .act button{font:inherit;font-size:12.5px;letter-spacing:.06em;padding:10px 16px;border-radius:6px;cursor:pointer;border:1px solid var(--stroke);background:var(--panel);color:var(--ink)}
  .term .act button.go{background:var(--green);color:#06070a;border-color:var(--green);font-weight:700}
</style>
</head>
<body>
<div class="glow"></div><div class="scan"></div>
<div class="wrap">
  <div class="ticker"><div class="run" id="run"></div></div>
  <div class="top">
    <div class="logo">LG&middot;<b>NEWSFEED</b> // FIG TERMINAL</div>
    <div class="cmd"><span>&gt;</span> filter feeds<span class="cur"></span></div>
    <div class="clock">FRI 27 JUN 2026 &middot; <b id="clk">--:--:--</b> ET &middot; <span id="unreadc">14</span> LIVE</div>
  </div>
  <div class="body">
    <div class="watch">
      <h4>WATCHLIST</h4>
      <div id="watch"></div>
    </div>
    <div class="feed">
      <div class="hrow"><span>SCORE</span><span>LANE</span><span>HEADLINE</span><span>SOURCE</span><span>TIME</span></div>
      <div id="rows"></div>
      <div class="end">&mdash;&mdash;&mdash; END OF SESSION FEED &mdash;&mdash;&mdash;
        <div><span class="b" onclick="this.textContent='// NO EARLIER SESSIONS';">LOAD PRIOR SESSION</span></div>
      </div>
    </div>
  </div>
</div>
<div class="scrim" id="scrim"><div class="term" id="term"></div></div>

<script>
const LANE={banks:{l:"BANKS",c:"--banks"},markets:{l:"MKTS/MACRO",c:"--markets"},news:{l:"NEWSLTR",c:"--news"},
  pe:{l:"PE/DEALS",c:"--pe"},sf:{l:"SPEC FIN",c:"--sf"},career:{l:"CAREER",c:"--career"},
  learn:{l:"LEARN",c:"--learn"},aw:{l:"ASSET/WM",c:"--aw"}};
const DATA=[
 {id:1,lane:"banks",score:9,src:"CNBC",time:"02:11",title:"JPMorgan names Petno and Rohrbaugh co-presidents as Lake exits",body:["JPMorgan named Doug Petno and Troy Rohrbaugh co-presidents; Marianne Lake departs after 30 years.","Sharpens the field to eventually succeed Jamie Dimon."],hl:"Co-president structure at the $3.9T bank — succession frontrunners."},
 {id:3,lane:"news",score:9,src:"Net Interest",time:"05:02",title:"The deposit franchise nobody is pricing correctly",body:["Rubinstein argues consensus underprices sticky low-cost retail funding at a handful of regionals."],hl:"Reusable frame for deposit-franchise value in FIG comps."},
 {id:6,lane:"learn",score:9,src:"Stratechery",time:"07:20",title:"Aggregation theory, ten years on: what the AI platforms got right",body:["Thompson maps aggregation onto AI incumbents; distribution, not models, remains the moat."],hl:"Strategy frame that travels beyond tech."},
 {id:2,lane:"sf",score:8,src:"Finextra",time:"03:40",title:"Binance to stop serving EU customers after failing to secure MiCA license",body:["Binance halts EU services July 1 after failing to obtain a MiCA license."],hl:"MiCA enforcement forces the largest exchange out of the EU."},
 {id:4,lane:"banks",score:8,src:"Banking Dive",time:"04:18",title:"Two Southeast banks to merge in $163M all-stock deal",body:["Colony Bank to acquire First Reliance Bancshares; largest sub-$10B bank in GA/SC."],hl:"$163M all-stock; platform for add-on M&A."},
 {id:5,lane:"pe",score:8,src:"PE Hub",time:"06:05",title:"Mid-market PE firm raises $2.1B for financial-services fund",body:["Fund targets specialty lenders and insurance services in the lower-middle market."],hl:"Dry powder aimed at specialty finance."},
 {id:7,lane:"career",score:8,src:"eFinCareers",time:"08:33",title:"Where FIG bankers are lateraling in 2026",body:["Which platforms are paying up for FIG coverage talent, and where bonuses land."],hl:"Direct lateral-market signal."},
 {id:9,lane:"markets",score:8,src:"The Overshoot",time:"10:09",title:"Credit conditions are quietly tightening at the regionals",body:["Tightening concentrated in CRE-exposed regionals per SLOOS internals."],hl:"Read-through to deal financing for smaller banks."},
 {id:8,lane:"markets",score:7,src:"TKer",time:"09:14",title:"The labor market is cooling, not cracking",body:["Latest payrolls consistent with a soft landing."],hl:"Clear takeaway on the rates path."},
 {id:10,lane:"aw",score:7,src:"WealthMgmt",time:"11:27",title:"RIA roll-up pace hits record in Q2",body:["Record RIA deal count; valuations holding despite higher financing costs."],hl:"Sustained RIA M&A."},
 {id:11,lane:"learn",score:7,src:"Noahpinion",time:"13:02",title:"Why the productivity debate is mostly measurement",body:["Much of the AI-productivity disagreement is a statistics problem."],hl:"Sharpens how to read productivity data."},
 {id:12,lane:"news",score:7,src:"The Diff",time:"14:20",title:"The economics of a stablecoin issuer",body:["Float-driven model; where the regulatory risk actually sits."],hl:"Frames digital assets in FIG terms."},
 {id:13,lane:"pe",score:7,src:"Buyouts",time:"16:41",title:"Secondaries pricing firms up as LPs seek liquidity",body:["Discounts to NAV narrowed in the latest LP-led tranche."],hl:"Liquidity returning to secondaries."},
 {id:14,lane:"markets",score:6,src:"WSJ Mkts",time:"17:55",title:"Treasury yields drift as traders weigh data",body:["Quiet session; 10-year little changed ahead of CPI."],hl:"Routine; watch next week's CPI."}
];
let activeLane="all", readSet=new Set();
function cvar(c){return getComputedStyle(document.documentElement).getPropertyValue(c).trim()}
function scoreColor(s){return s>=9?cvar('--green'):s>=7?cvar('--amber'):cvar('--faint')}

function buildTicker(){
  const run=document.getElementById('run');
  run.innerHTML=DATA.slice().sort((a,b)=>b.score-a.score).map(d=>{
    const cls=d.score>=9?"up":d.score>=7?"mid":"lo";
    return `<span class="it"><b>${LANE[d.lane].l}</b> ${d.title.slice(0,46)}${d.title.length>46?"…":""} <span class="${cls}">${d.score}</span></span>`;
  }).join("");
}
function buildWatch(){
  const w=document.getElementById('watch'), keys=["all",...new Set(DATA.map(d=>d.lane))];
  w.innerHTML="";
  keys.forEach(k=>{
    const cnt=k==="all"?DATA.filter(d=>!readSet.has(d.id)).length:DATA.filter(d=>d.lane===k&&!readSet.has(d.id)).length;
    const col=k==="all"?cvar('--cyan'):cvar(LANE[k].c);
    const el=document.createElement('div');el.className="wrow"+(activeLane===k?" active":"");
    el.innerHTML=`<span class="dot" style="background:${col}"></span><span class="n">${k==="all"?"ALL FEEDS":LANE[k].l}</span><span class="c">${cnt}</span>`;
    el.onclick=()=>{activeLane=k;buildWatch();renderRows();};
    w.appendChild(el);
  });
}
function renderRows(){
  const rows=document.getElementById('rows');rows.innerHTML="";
  DATA.slice().sort((a,b)=>(readSet.has(a.id)-readSet.has(b.id))||(b.score-a.score))
    .filter(d=>activeLane==="all"||d.lane===activeLane)
    .forEach(d=>{
      const L=LANE[d.lane], col=cvar(L.c), sc=scoreColor(d.score);
      const el=document.createElement('div');el.className="row"+(readSet.has(d.id)?" read":"");el.dataset.id=d.id;
      el.innerHTML=`<span class="sc" style="color:${sc}">${d.score}<span class="bar"><i style="width:${d.score*10}%;background:${sc}"></i></span></span>
        <span class="lane" style="color:${col}">${L.l}</span>
        <span class="ttl">${d.title}</span>
        <span class="src">${d.src}</span>
        <span class="tm">${d.time}</span>`;
      el.onclick=()=>openTerm(d);
      rows.appendChild(el);
    });
  document.getElementById('unreadc').textContent=DATA.filter(d=>!readSet.has(d.id)).length;
}
function openTerm(d){
  const L=LANE[d.lane], col=cvar(L.c), t=document.getElementById('term');
  t.innerHTML=`<div class="bar"><span>FEED://${L.l}/${String(d.id).padStart(3,'0')}</span><span>REL ${d.score}/10</span><span class="x" onclick="closeTerm()">[ESC] ✕</span></div>
    <div class="pad"><div class="lane" style="color:${col}">▌ ${L.l} &middot; ${d.src} &middot; ${d.time} ET</div>
    <h2>${d.title}</h2>${d.body.map(p=>`<p>${p}</p>`).join("")}<div class="hl">${d.hl}</div>
    <div class="act"><button class="go" id="fileBtn">FILE &amp; DIM ROW</button><button onclick="closeTerm()">KEEP LIVE</button></div></div>`;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('fileBtn').onclick=()=>{readSet.add(d.id);closeTerm();buildWatch();renderRows();};
}
function closeTerm(){document.getElementById('scrim').classList.remove('open');}
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeTerm();});
document.addEventListener('keydown',e=>{if(e.key==="Escape")closeTerm();});
function tick(){const d=new Date();document.getElementById('clk').textContent=d.toTimeString().slice(0,8);}
setInterval(tick,1000);tick();
buildTicker();buildWatch();renderRows();
</script>
</body>
</html>
